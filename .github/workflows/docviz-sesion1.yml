name: DocViz Sesión 1 - Docker Hub Versionado

on:
  push:
    # Se activa al subir cambios a tu rama actual o a main
    branches: 
      - BSG-DIE-SESION1
      - main
  pull_request:
    # Se activa cuando se crea un PR hacia main
    branches: 
      - main

concurrency:
  group: docviz-sesion1-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Ruta raíz según tu cambio a snake-case (verificar minúsculas)
  SESION_ROOT: "diseño-infraestructura-escalable/sesion1"

jobs:
  changes:
    name: Detectar cambios
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      security: ${{ steps.filter.outputs.security }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'diseño-infraestructura-escalable/sesion1/backend-sesion1/**'
            frontend:
              - 'diseño-infraestructura-escalable/sesion1/frontend-sesion1/**'
            security:
              - 'diseño-infraestructura-escalable/sesion1/back-security-sesion1/**'

  # Job de Pruebas y Compilación (Java 21)
  test-java:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.security == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Maven Build
        run: |
          # Usamos rutas relativas directas para evitar errores de ruta absoluta
          if [ "${{ needs.changes.outputs.backend }}" == "true" ]; then
            echo "Construyendo backend-sesion1..."
            mvn -f "${{ env.SESION_ROOT }}/backend-sesion1/pom.xml" clean compile -DskipTests
          fi
          
          if [ "${{ needs.changes.outputs.security }}" == "true" ]; then
            echo "Construyendo back-security-sesion1..."
            mvn -f "${{ env.SESION_ROOT }}/back-security-sesion1/pom.xml" clean compile -DskipTests
          fi

  # Job de Construcción y Subida a Docker Hub
  build-and-push:
    needs: [changes, test-java]
    # Se ejecuta si las pruebas pasan o si se saltaron (skipped)
    if: |
      always() && 
      github.event_name == 'push' && 
      (needs.test-java.result == 'success' || needs.test-java.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [back-security-sesion1, backend-sesion1, frontend-sesion1]
    
    steps:
      - uses: actions/checkout@v4

      - name: Check Project Change
        id: check
        run: |
          SHOULD_RUN="false"
          if [[ "${{ matrix.project }}" == "back-security-sesion1" && "${{ needs.changes.outputs.security }}" == "true" ]]; then SHOULD_RUN="true"; fi
          if [[ "${{ matrix.project }}" == "backend-sesion1" && "${{ needs.changes.outputs.backend }}" == "true" ]]; then SHOULD_RUN="true"; fi
          if [[ "${{ matrix.project }}" == "frontend-sesion1" && "${{ needs.changes.outputs.frontend }}" == "true" ]]; then SHOULD_RUN="true"; fi
          echo "run=$SHOULD_RUN" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        if: steps.check.outputs.run == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Build and Push
        if: steps.check.outputs.run == 'true'
        run: |
          APP_PATH="${{ env.SESION_ROOT }}/${{ matrix.project }}"
          # Lectura dinámica de versión
          VERSION=$(cat "$APP_PATH/version.txt" | xargs)
          REPO_NAME="${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.project }}"
          
          echo "Subiendo imagen: $REPO_NAME con tag: $VERSION"
          
          docker build -t "$REPO_NAME:$VERSION" -t "$REPO_NAME:latest" -f "$APP_PATH/Dockerfile" "$APP_PATH"
          docker push "$REPO_NAME:$VERSION"
          docker push "$REPO_NAME:latest"