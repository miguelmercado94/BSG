name: DocViz Sesión 1 - Docker Hub Versionado

on:
  push:
    # Se activa al subir cambios a tu rama actual o a main
    branches: 
      - BSG-DIE-SESION1
      - main
  pull_request:
    # Se activa cuando se crea un PR hacia main
    branches: 
      - main

concurrency:
  group: docviz-sesion1-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SESION_ROOT: "Diseño de Infraestructura Escalable/Sesion 1"

jobs:
  changes:
    name: Detectar cambios
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      security: ${{ steps.filter.outputs.security }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'Diseño de Infraestructura Escalable/Sesion 1/backend-sesion1/**'
            frontend:
              - 'Diseño de Infraestructura Escalable/Sesion 1/frontend-sesion1/**'
            security:
              - 'Diseño de Infraestructura Escalable/Sesion 1/back-security-sesion1/**'

  # Pruebas de Java (Backend y Seguridad)
  test-java:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.security == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Run Maven Tests
        run: |
          if [ "${{ needs.changes.outputs.backend }}" == "true" ]; then
            mvn -f "${{ env.SESION_ROOT }}/backend-sesion1/pom.xml" test
          fi
          if [ "${{ needs.changes.outputs.security }}" == "true" ]; then
            mvn -f "${{ env.SESION_ROOT }}/back-security-sesion1/pom.xml" test
          fi

  # Construcción y subida a Docker Hub
  build-and-push:
    needs: [changes, test-java]
    # Se ejecuta solo en push y si hubo cambios detectados
    if: github.event_name == 'push' && (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.security == 'true')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [back-security-sesion1, backend-sesion1, frontend-sesion1]
    
    steps:
      - uses: actions/checkout@v4

      # Filtro interno de la matriz
      - name: Should run for this project
        id: check
        run: |
          SHOULD_RUN="false"
          if [[ "${{ matrix.project }}" == "back-security-sesion1" && "${{ needs.changes.outputs.security }}" == "true" ]]; then SHOULD_RUN="true"; fi
          if [[ "${{ matrix.project }}" == "backend-sesion1" && "${{ needs.changes.outputs.backend }}" == "true" ]]; then SHOULD_RUN="true"; fi
          if [[ "${{ matrix.project }}" == "frontend-sesion1" && "${{ needs.changes.outputs.frontend }}" == "true" ]]; then SHOULD_RUN="true"; fi
          echo "run=$SHOULD_RUN" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        if: steps.check.outputs.run == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Build and Push
        if: steps.check.outputs.run == 'true'
        run: |
          APP_PATH="${{ env.SESION_ROOT }}/${{ matrix.project }}"
          # Leer versión del archivo y limpiar espacios
          VERSION=$(cat "$APP_PATH/version.txt" | xargs)
          REPO_NAME="${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.project }}"
          
          echo "Construyendo imagen para ${{ matrix.project }} en la ruta $APP_PATH con versión $VERSION"
          
          docker build -t "$REPO_NAME:$VERSION" -t "$REPO_NAME:latest" -f "$APP_PATH/Dockerfile" "$APP_PATH"
          docker push "$REPO_NAME:$VERSION"
          docker push "$REPO_NAME:latest"