server.port=${PORT:8080}
# Prefijo de todas las rutas HTTP REST. Alinear con module.path_base=docviz en back-security-sesion1/data.sql.
server.servlet.context-path=${SERVER_SERVLET_CONTEXT_PATH:/docviz}
spring.application.name=document-context-visualizer
# Ingesta NDJSON larga (/vector/ingest/stream): sin esto Tomcat corta el async (~30s) y aparece AsyncRequestTimeoutException.
spring.mvc.async.request-timeout=${SPRING_MVC_ASYNC_REQUEST_TIMEOUT:1h}
# Tomcat con hilos virtuales (Java 21). Si Docker/JRE dan problemas, pon false (modo clásico).
spring.threads.virtual.enabled=true

# Spring: local = Ollama | develop/pdn = OpenAI (chat GPT-4.1 Mini + embeddings text-embedding-3-small) si spring-ai
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Opcional: overrides locales (application-local.properties).
spring.config.import=optional:file:./application-local.properties

docviz.context-masters.base-path=context-masters

# Arranque opcional desde main: clone Git (HTTPS público) + ingesta vectorial (mismo flujo que la API). Requiere git en PATH.
docviz.bootstrap.enabled=${DOCVIZ_BOOTSTRAP_ENABLED:false}
docviz.bootstrap.git-url=${DOCVIZ_BOOTSTRAP_GIT_URL:}
docviz.bootstrap.user-id=${DOCVIZ_BOOTSTRAP_USER_ID:bootstrap}
docviz.bootstrap.run-ingest=${DOCVIZ_BOOTSTRAP_INGEST:true}

# Firebase / Firestore (Admin SDK). Descarga JSON: Firebase Console → ⚙️ Proyecto → Cuentas de servicio → Generar nueva clave privada
docviz.firebase.enabled=${FIREBASE_ENABLED:false}
docviz.firebase.project-id=${FIREBASE_PROJECT_ID:sesion-bsg}
# Ruta al JSON (o deja vacío y usa GOOGLE_APPLICATION_CREDENTIALS en .env)
docviz.firebase.credentials-path=${FIREBASE_CREDENTIALS_PATH:}

# Chat RAG: historial en Firestore (users/{userId}/messages). Requiere FIREBASE_ENABLED=true y credenciales.
docviz.chat.history-max-turns=${DOCVIZ_CHAT_HISTORY_MAX_TURNS:12}
docviz.chat.history-answer-max-chars=${DOCVIZ_CHAT_HISTORY_ANSWER_MAX_CHARS:2000}

# --- Vector store: pgvector (PostgreSQL) ---
docviz.vector.store=${DOCVIZ_VECTOR_STORE:pgvector}
# Embeddings: spring-ollama (Ollama) | spring-ai (OpenAI text-embedding-3-small en develop/pdn)
# ECS/Terraform: DOCVIZ_EMBEDDINGS_PROVIDER o estándar Spring docviz.vector.* → DOCVIZ_VECTOR_EMBEDDINGS_PROVIDER
docviz.vector.embeddings-provider=${DOCVIZ_VECTOR_EMBEDDINGS_PROVIDER:${DOCVIZ_EMBEDDINGS_PROVIDER:spring-ollama}}
# Dimensión del embedding (debe coincidir con el modelo; p. ej. nomic-embed-text → 768)
docviz.vector.embedding-dimensions=${DOCVIZ_VECTOR_EMBEDDING_DIM:768}

# PostgreSQL (requerido para pgvector).
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/docviz}
spring.datasource.username=${DATABASE_USER:docviz}
spring.datasource.password=${DATABASE_PASSWORD:docviz}

docviz.vector.enabled=true
docviz.vector.embed-batch-delay-ms=2500
# Chunks por lote en ingesta. Para ir “lento y seguro”: 1 chunk por lote.
docviz.vector.embed-chunk-batch-size=32
# Prefetch ingesta: true = pool de plataforma (más lento); false = hilos virtuales (Java 21).
docviz.vector.prefetch-use-platform-threads=false
docviz.vector.chunk-size=800
docviz.vector.chunk-overlap=120
docviz.vector.rag-top-k=6
# Límite del bloque "Contexto del repositorio" en el prompt (caracteres). Ajusta junto a spring.ai.ollama.chat.options.num-ctx.
docviz.vector.rag-max-context-chars=${DOCVIZ_VECTOR_RAG_MAX_CONTEXT_CHARS:12000}
# Prueba de ingesta: solo este archivo del classpath (no recorre el repo). false = ingesta completa del repo.
docviz.vector.ingest-classpath-sample-only=false
docviz.vector.classpath-sample-resource=test_gemini_key.py

# Markdown de soporte: S3 (p. ej. LocalStack) + mismos embeddings/pgvector que el repo
docviz.support.enabled=${DOCVIZ_SUPPORT_ENABLED:false}
docviz.support.s3-endpoint=${DOCVIZ_SUPPORT_S3_ENDPOINT:}
# Vacío = mismo que s3-endpoint. En backend dentro de Docker: DOCVIZ_SUPPORT_S3_PRESIGN_ENDPOINT=http://127.0.0.1:4566
docviz.support.s3-presign-endpoint=${DOCVIZ_SUPPORT_S3_PRESIGN_ENDPOINT:}
docviz.support.s3-region=${DOCVIZ_SUPPORT_S3_REGION:us-east-1}
docviz.support.s3-bucket=${DOCVIZ_SUPPORT_S3_BUCKET:soporte}
docviz.support.max-upload-bytes=${DOCVIZ_SUPPORT_MAX_UPLOAD_BYTES:2000000}
# Bucket soporte: claves {repoSlug}/{archivo}.{ext} o _session/…
docviz.support.support-repo-prefix-template={repoSlug}/
docviz.support.support-session-prefix-template=_session/
docviz.support.presigned-url-ttl-seconds=${DOCVIZ_SUPPORT_PRESIGN_TTL_SECONDS:3600}

# Borrador / workarea en S3: activa el mismo cliente que soporte (endpoint en docviz.support.s3-endpoint).
# Si solo quieres LocalStack para área de trabajo sin módulo soporte: true + endpoint (sin docviz.support.enabled).
docviz.workspace-s3.enabled=${DOCVIZ_WORKSPACE_S3_ENABLED:false}
# Buckets dedicados borradores / workarea; claves {userId}/{taskCode}/{archivo}
docviz.workspace-s3.borrador-bucket=${DOCVIZ_WORKSPACE_S3_BORRADOR_BUCKET:borradores}
docviz.workspace-s3.workarea-bucket=${DOCVIZ_WORKSPACE_S3_WORKAREA_BUCKET:workarea}
docviz.workspace-s3.key-root-template=
docviz.workspace-s3.borradores-prefix-template={userId}/{taskCode}/
docviz.workspace-s3.workarea-prefix-template={userId}/{taskCode}/

spring.servlet.multipart.max-file-size=3MB
spring.servlet.multipart.max-request-size=3MB

# Solo /health (NLB AWS en TCP 8080 + DocvizUserFilter permite /actuator sin X-DocViz-User).
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
