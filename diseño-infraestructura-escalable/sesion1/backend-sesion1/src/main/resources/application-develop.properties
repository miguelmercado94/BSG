# Perfil Spring "develop": chat vía Google Gemini (API key de AI Studio).
# Activar con SPRING_PROFILES_ACTIVE=develop (+ GEMINI_API_KEY en runtime).
#
# RAG/embeddings: sin modelo Ollama local, se usa PineconeInferenceEmbeddingClient → define PINECONE_API_KEY
# o añade un EmbeddingModel (p. ej. otro proveedor Spring AI).

spring.ai.model.chat=google-genai
spring.ai.google.genai.api-key=${GEMINI_API_KEY:}
spring.ai.google.genai.chat.options.model=${GEMINI_MODEL:gemini-2.5-flash}
