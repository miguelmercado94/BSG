# Perfil Spring "develop": chat vía Google Gemini (API key de AI Studio).
# Activar con SPRING_PROFILES_ACTIVE=develop (+ GEMINI_API_KEY en runtime).
#
# RAG/embeddings: usa modelos de Spring AI (Gemini).

spring.ai.model.chat=google-genai
spring.ai.google.genai.api-key=${GEMINI_API_KEY:}
spring.ai.google.genai.chat.options.model=${GEMINI_MODEL:gemini-2.5-flash}

# LocalStack S3 para desarrollo
docviz.support.s3-endpoint=${DOCVIZ_SUPPORT_S3_ENDPOINT:http://127.0.0.1:4566}
docviz.support.s3-presign-endpoint=${DOCVIZ_SUPPORT_S3_PRESIGN_ENDPOINT:http://127.0.0.1:4566}
docviz.support.access-key=test
docviz.support.secret-key=test
