# Perfil "pdn": Producción en AWS ECS Fargate
# Chat RAG + embeddings: OpenAI (misma OPENAI_API_KEY). Chat: OPENAI_CHAT_MODEL (defecto gpt-4o-mini); embeddings: text-embedding-3-small.

# Sin Ollama en ECS: excluir auto-config Ollama para que no compita con OpenAI (chat + embeddings).
spring.autoconfigure.exclude=org.springframework.ai.model.ollama.autoconfigure.OllamaApiAutoConfiguration,org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration,org.springframework.ai.model.ollama.autoconfigure.OllamaEmbeddingAutoConfiguration

# Spring AI 1.x instancia también beans OpenAI opcionales (p. ej. Audio Speech) que leen esta clave global.
# Sin spring.ai.openai.api-key el arranque falla aunque chat y embedding tengan spring.ai.openai.*.api-key.
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.base-url=https://api.openai.com

spring.ai.model.chat=openai
spring.ai.openai.chat.base-url=https://api.openai.com
spring.ai.openai.chat.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=${OPENAI_CHAT_MODEL:gpt-4o-mini}
# API Chat Completions (modelos recientes): usar max_completion_tokens; max_tokens puede provocar 400.
spring.ai.openai.chat.options.max-completion-tokens=8192

spring.ai.model.embedding.text=openai
spring.ai.openai.embedding.base-url=https://api.openai.com
spring.ai.openai.embedding.api-key=${OPENAI_API_KEY:}
spring.ai.openai.embedding.options.model=text-embedding-3-small
spring.ai.openai.embedding.options.dimensions=${DOCVIZ_VECTOR_EMBEDDING_DIM:768}

# Debe coincidir con OpenAI arriba y con EmbeddingClientConfiguration (spring-ai).
docviz.vector.embeddings-provider=spring-ai

# Ingesta en ECS: lotes pequeños y prefetch acotado para no saturar CPU/RAM del task (evita 503 en el resto de la API).
docviz.vector.embed-chunk-batch-size=${DOCVIZ_VECTOR_EMBED_CHUNK_BATCH_SIZE:8}
docviz.vector.embed-batch-delay-ms=${DOCVIZ_VECTOR_EMBED_BATCH_DELAY_MS:1200}
docviz.vector.prefetch-use-platform-threads=${DOCVIZ_VECTOR_PREFETCH_USE_PLATFORM_THREADS:true}

# Pool JDBC modesto: la ingesta es mayormente secuencial por repo.
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:12}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:2}

# S3: sin endpoint = cliente regional AWS; credenciales = cadena por defecto del SDK (IAM del task).
docviz.support.s3-endpoint=${DOCVIZ_SUPPORT_S3_ENDPOINT:}
docviz.support.s3-presign-endpoint=${DOCVIZ_SUPPORT_S3_PRESIGN_ENDPOINT:}
