# Desarrollo local: PostgreSQL alineado con Sesion 1/docker-compose.yml → postgres-security (host 5433, BD bsg_security).
# Sobrescribir con SPRING_R2DBC_* si usas otra instancia.
# - Cada arranque: spring.sql.init en modo "always" + schema.sql (DROP) + data.sql.
# - Pipeline CI/CD configurado hacia AWS ECS Fargate.
# - Redis desactivado; autoconfig Redis excluida (sin conexión Lettuce).
# - Logs DEBUG y trazas SQL R2DBC.

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.data.redis.autoconfigure.DataRedisAutoConfiguration
      - org.springframework.boot.data.redis.autoconfigure.DataRedisReactiveAutoConfiguration
      - org.springframework.boot.data.redis.autoconfigure.DataRedisRepositoriesAutoConfiguration
      - org.springframework.boot.data.redis.autoconfigure.health.DataRedisHealthContributorAutoConfiguration
      - org.springframework.boot.data.redis.autoconfigure.health.DataRedisReactiveHealthContributorAutoConfiguration

  sql:
    init:
      mode: ${SPRING_SQL_INIT_MODE:always}
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
  r2dbc:
    url: ${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5433/bsg_security}
    username: ${SPRING_R2DBC_USERNAME:bsg_security}
    password: ${SPRING_R2DBC_PASSWORD:bsg_security}

bsg:
  security:
    deployment: ${BSG_SECURITY_DEPLOYMENT:dev}
    auth:
      reset-password-base-url: ${BSG_SECURITY_AUTH_RESET_PASSWORD_BASE_URL:http://localhost:3000/reset-password}
      recovery-token-expiry-minutes: ${BSG_SECURITY_AUTH_RECOVERY_TOKEN_EXPIRY_MINUTES:60}
    aws:
      dynamodb:
        enabled: ${BSG_SECURITY_AWS_DYNAMODB_ENABLED:false}
        endpoint: ${BSG_SECURITY_AWS_DYNAMODB_ENDPOINT:http://localhost:4566}
        region: ${BSG_SECURITY_AWS_DYNAMODB_REGION:us-east-1}
        revoked-tokens-table: ${BSG_SECURITY_AWS_DYNAMODB_REVOKED_TOKENS_TABLE:bsg_revoked_tokens}
        create-table-if-not-exists: ${BSG_SECURITY_AWS_DYNAMODB_CREATE_TABLE_IF_NOT_EXISTS:true}
    redis:
      enabled: false

cloud:
  aws:
    credentials:
      access-key: test
      secret-key: test

management:
  health:
    redis:
      enabled: false
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: ${LOG_LEVEL_ROOT:DEBUG}
    com.bsg.security: DEBUG
    com.bsg.security.config.security.authentication.filter: DEBUG
    com.bsg.security.application.service.impl.UsuarioServiceImpl: DEBUG
    com.bsg.security.application.usecase.impl.RequestPasswordRecoveryUseCaseImpl: DEBUG
    com.bsg.security.application.usecase.impl.ResetPasswordUseCaseImpl: DEBUG
    com.bsg.security.infrastructure.adapter.persistence: DEBUG
    com.bsg.security.infrastructure.adapter.cache: INFO
    org.springframework.security: DEBUG
    org.springframework.r2dbc.core: DEBUG
    org.springframework.data.r2dbc: DEBUG
    org.springframework.data.r2dbc.core: DEBUG
    io.r2dbc: DEBUG
    io.r2dbc.postgresql: DEBUG
    io.r2dbc.pool: DEBUG
    reactor.netty: INFO
