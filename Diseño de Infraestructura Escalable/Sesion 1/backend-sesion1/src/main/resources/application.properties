server.port=${PORT:8080}
spring.application.name=document-context-visualizer
# Ingesta NDJSON larga (/vector/ingest/stream): sin esto Tomcat corta el async (~30s) y aparece AsyncRequestTimeoutException.
spring.mvc.async.request-timeout=${SPRING_MVC_ASYNC_REQUEST_TIMEOUT:1h}
# Tomcat con hilos virtuales (Java 21). Si Docker/JRE dan problemas, pon false (modo clásico).
spring.threads.virtual.enabled=true

# Spring: local = Ollama | develop = Gemini (debe coincidir con el perfil Maven usado al empaquetar)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Opcional: overrides locales (sin clave Pinecone aquí mientras dure lo de abajo).
spring.config.import=optional:file:./application-local.properties

docviz.context-masters.base-path=context-masters

# Arranque opcional desde main: clone Git (HTTPS público) + ingesta vectorial (mismo flujo que la API). Requiere git en PATH.
docviz.bootstrap.enabled=${DOCVIZ_BOOTSTRAP_ENABLED:false}
docviz.bootstrap.git-url=${DOCVIZ_BOOTSTRAP_GIT_URL:}
docviz.bootstrap.user-id=${DOCVIZ_BOOTSTRAP_USER_ID:bootstrap}
docviz.bootstrap.run-ingest=${DOCVIZ_BOOTSTRAP_INGEST:true}

# Firebase / Firestore (Admin SDK). Descarga JSON: Firebase Console → ⚙️ Proyecto → Cuentas de servicio → Generar nueva clave privada
docviz.firebase.enabled=${FIREBASE_ENABLED:false}
docviz.firebase.project-id=${FIREBASE_PROJECT_ID:sesion-bsg}
# Ruta al JSON (o deja vacío y usa GOOGLE_APPLICATION_CREDENTIALS en .env)
docviz.firebase.credentials-path=${FIREBASE_CREDENTIALS_PATH:}

# Chat RAG: historial en Firestore (users/{userId}/messages). Requiere FIREBASE_ENABLED=true y credenciales.
docviz.chat.history-max-turns=${DOCVIZ_CHAT_HISTORY_MAX_TURNS:12}
docviz.chat.history-answer-max-chars=${DOCVIZ_CHAT_HISTORY_ANSWER_MAX_CHARS:2000}

# --- Vector store: pgvector (PostgreSQL) por defecto; pinecone = API HTTP legada ---
docviz.vector.store=${DOCVIZ_VECTOR_STORE:pgvector}
# Embeddings: spring-ollama (Ollama vía Spring AI) | pinecone-inference (API Pinecone; requiere PINECONE_API_KEY)
docviz.vector.embeddings-provider=${DOCVIZ_EMBEDDINGS_PROVIDER:spring-ollama}
# Dimensión del embedding (debe coincidir con el modelo; p. ej. nomic-embed-text → 768)
docviz.vector.embedding-dimensions=${DOCVIZ_VECTOR_EMBEDDING_DIM:768}

# PostgreSQL (requerido si docviz.vector.store=pgvector). Con store=pinecone puedes excluir JDBC (ver comentario abajo).
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/docviz}
spring.datasource.username=${DATABASE_USER:docviz}
spring.datasource.password=${DATABASE_PASSWORD:docviz}

docviz.vector.enabled=true
# Pinecone: índice vectorial legado (docviz.vector.store=pinecone) o embeddings HTTP solo si embeddings-provider=pinecone-inference.
# Misma fuente: PINECONE_API_KEY en backend-sesion1/.env (DotenvEnvironmentPostProcessor).
docviz.vector.pinecone-api-key=${PINECONE_API_KEY:}
docviz.vector.pinecone-index-name=docviz-embed
docviz.vector.pinecone-index-host=https://docviz-embed-qyp1ieo.svc.aped-4627-b74a.pinecone.io
# Embeddings: API de inferencia (no el host del índice)
docviz.vector.pinecone-inference-host=api.pinecone.io
docviz.vector.pinecone-embed-model=llama-text-embed-v2
docviz.vector.embed-batch-delay-ms=2500
# Chunks por petición a Pinecone /embed. Para ir “lento y seguro”: 1 chunk por request.
docviz.vector.embed-chunk-batch-size=32
# Prefetch ingesta: true = pool de plataforma (más lento); false = hilos virtuales (Java 21).
docviz.vector.prefetch-use-platform-threads=false
docviz.vector.chunk-size=800
docviz.vector.chunk-overlap=120
docviz.vector.rag-top-k=6
# Prueba Pinecone: solo este archivo del classpath (no recorre el repo). false = ingesta completa del repo.
docviz.vector.ingest-classpath-sample-only=false
docviz.vector.classpath-sample-resource=test_gemini_key.py
