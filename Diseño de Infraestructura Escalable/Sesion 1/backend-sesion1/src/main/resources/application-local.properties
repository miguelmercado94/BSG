# Perfil Spring "local": chat vía Ollama (mismo host que docker-compose.ollama o nativo)
# Requiere empaquetar con perfil Maven: local (por defecto)

spring.ai.model.chat=ollama
# Spring AI 1.1+: embeddings vía spring.ai.model.embedding (ollama por defecto; la clave antigua spring.ai.ollama.embedding.enabled ya no existe)
spring.ai.model.embedding=ollama
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://127.0.0.1:11434}
# Nombre exacto como en `ollama list` (ej. llama3.2). Override: variable de entorno OLLAMA_MODEL o backend-sesion1/.env
spring.ai.ollama.chat.options.model=${OLLAMA_MODEL:llama3.2}
# Ventana de contexto (tokens) en Ollama; por defecto muchos modelos usan 2048 y el RAG + historial desborda.
spring.ai.ollama.chat.options.num-ctx=${OLLAMA_NUM_CTX:8192}
# Embeddings RAG (768 dims → alinear docviz.vector.embedding-dimensions)
spring.ai.ollama.embedding.options.model=${OLLAMA_EMBED_MODEL:nomic-embed-text}

# pgvector + Ollama: sin pausa entre lotes (embed-batch-delay en application.properties era para Pinecone API).
# Lotes más pequeños = más eventos de progreso y menos “congelado” en .md largos (más llamadas a Ollama).
docviz.vector.embed-batch-delay-ms=0
docviz.vector.embed-chunk-batch-size=4
# Menos turnos en local = menos tokens con historial + RAG (docviz.chat.history-max-turns en application.properties).
docviz.chat.history-max-turns=${DOCVIZ_CHAT_HISTORY_MAX_TURNS:6}

# Panel SOPORTE: subir .md → S3 (LocalStack) + embeddings pgvector. Arranca S3: docker compose up -d localstack (puerto 4566).
# Sin LocalStack: exporta DOCVIZ_SUPPORT_ENABLED=false o el POST /support/markdown fallará al hablar con S3.
docviz.support.enabled=${DOCVIZ_SUPPORT_ENABLED:true}
# Área de trabajo: buckets borradores + workarea (endpoint/credenciales compartidos con soporte).
docviz.workspace-s3.enabled=${DOCVIZ_WORKSPACE_S3_ENABLED:true}
docviz.support.s3-endpoint=${DOCVIZ_SUPPORT_S3_ENDPOINT:http://127.0.0.1:4566}
docviz.support.s3-region=${DOCVIZ_SUPPORT_S3_REGION:us-east-1}
docviz.support.s3-bucket=${DOCVIZ_SUPPORT_S3_BUCKET:soporte}
docviz.workspace-s3.borrador-bucket=${DOCVIZ_WORKSPACE_S3_BORRADOR_BUCKET:borradores}
docviz.workspace-s3.workarea-bucket=${DOCVIZ_WORKSPACE_S3_WORKAREA_BUCKET:workarea}
docviz.support.access-key=${AWS_ACCESS_KEY_ID:test}
docviz.support.secret-key=${AWS_SECRET_ACCESS_KEY:test}
