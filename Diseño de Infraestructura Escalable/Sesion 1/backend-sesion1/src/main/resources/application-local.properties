# Perfil Spring "local": chat vía Ollama (mismo host que docker-compose.ollama o nativo)
# Requiere empaquetar con perfil Maven: local (por defecto)

spring.ai.model.chat=ollama
# Spring AI 1.1+: embeddings vía spring.ai.model.embedding (ollama por defecto; la clave antigua spring.ai.ollama.embedding.enabled ya no existe)
spring.ai.model.embedding=ollama
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://127.0.0.1:11434}
spring.ai.ollama.chat.options.model=${OLLAMA_MODEL:qwen2.5:3b}
# Embeddings RAG (768 dims → alinear docviz.vector.embedding-dimensions)
spring.ai.ollama.embedding.options.model=${OLLAMA_EMBED_MODEL:nomic-embed-text}

# pgvector + Ollama: sin pausa entre lotes (embed-batch-delay en application.properties era para Pinecone API).
# Lotes más pequeños = más eventos de progreso y menos “congelado” en .md largos (más llamadas a Ollama).
docviz.vector.embed-batch-delay-ms=0
docviz.vector.embed-chunk-batch-size=4
