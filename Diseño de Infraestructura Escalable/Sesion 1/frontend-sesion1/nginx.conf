server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss;

    # Solo SPA. Las llamadas al API van al origen definido en VITE_API_URL (URL absoluta en prod;
    # en local docker-compose: http://127.0.0.1:8080). No proxy a "backend" — en Railway ese host no existe y Nginx falla al arrancar.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
